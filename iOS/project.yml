name: MigraineLog
options:
  bundleIdPrefix: com.shimondeitel.migrainelog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  MigraineLog:
    type: application
    platform: iOS
    sources:
      - path: MigraineLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.migrainelog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: MigraineLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  MigraineLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MigraineLogTests
      - path: MigraineLog.storekit
    dependencies:
      - target: MigraineLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.migrainelog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  MigraineLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: MigraineLogUITests
    dependencies:
      - target: MigraineLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.migrainelog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  MigraineLog:
    build:
      targets:
        MigraineLog: all
        MigraineLogTests: [test]
        MigraineLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: MigraineLog.storekit
    test:
      config: Debug
      storeKitConfiguration: MigraineLog.storekit
      targets:
        - MigraineLogTests
        - MigraineLogUITests
    archive:
      config: Release
